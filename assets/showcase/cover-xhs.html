<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C · 极简大字 · 精调</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:40px}
.cover{width:375px;aspect-ratio:3/4;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;background:#1A1A2E;box-shadow:0 12px 48px rgba(0,0,0,0.6);position:relative}
.top-rule{flex-shrink:0;height:3px;background:#FF6B35}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 32px}
.preposition{font-size:44px;font-weight:900;color:rgba(255,255,255,0.5);line-height:1;margin-bottom:2px;letter-spacing:0.03em;transform:rotate(-7deg);display:inline-block;transform-origin:left center}
.court{font-weight:900;color:#FFFFFF;line-height:1.08;letter-spacing:-0.01em;white-space:nowrap}
.court.main{font-size:42px;margin-bottom:6px}
.court.sub{font-size:30px;color:rgba(255,255,255,0.82)}
.court.third{font-size:23px;color:rgba(255,255,255,0.65);margin-top:4px}
.divider-wrap{margin:28px 0}
.divider{display:flex;align-items:center;gap:10px}
.divider-line{flex:1;height:1px;background:rgba(255,107,53,0.5)}
.divider-dot{width:4px;height:4px;border-radius:50%;background:#FF6B35;flex-shrink:0}
.action{margin-top:16px}
.action-prefix{font-size:30px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:6px}
.action-brand{font-size:42px;font-weight:900;color:#FF6B35;letter-spacing:-0.015em;line-height:1.1}
.footer{flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 32px}
.footer-left{font-size:11px;color:rgba(255,255,255,0.3);line-height:1.6}
.footer-right{text-align:right}
.footer-tag{display:inline-block;border:1px solid rgba(255,107,53,0.3);border-radius:4px;padding:3px 10px;font-size:10px;color:#FF6B35;letter-spacing:0.08em;margin-bottom:6px}
.footer-sub{font-size:10px;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div class="cover">
  <div class="top-rule"></div>
  <div class="body">
    <div class="preposition">把</div>
    <div class="court main">「上海一中院」</div>
    <div class="court sub">「上海二中院」</div>
    <div class="court third">「山东高法」</div>
    <div class="divider-wrap">
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
        <span class="divider-line"></span>
      </div>
    </div>
    <div class="action">
      <div class="action-prefix">装进</div>
      <div class="action-brand">WorkBuddy</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-left">配置一次 · 每周三、五<br>自动推送</div>
    <div class="footer-right">
      <div class="footer-tag">RED SKILL</div>
      <div class="footer-sub">@吴律</div>
    </div>
  </div>
</div>
</body>
</html>
